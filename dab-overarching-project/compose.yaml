services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - project.env

  flyway:
    image: flyway/flyway:10.8.1-alpine
    environment:
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_URL: jdbc:postgresql://database:5432/${POSTGRES_DB}
    volumes:
      - ./database-migrations:/flyway/sql
    depends_on:
      - database
    command: -connectRetries=60 migrate
    env_file:
      - project.env

  server:
    build: ./server
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: database
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - database
      - flyway
      - redis
    env_file:
      - project.env

  grader:
    build: ./grader
    restart: on-failure
    ports:
      - "8001:8000"
    environment:
      POSTGRES_HOST: database
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - database
      - flyway
      - redis
    env_file:
      - project.env

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
