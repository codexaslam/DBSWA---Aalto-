apiVersion: apps/v1
kind: Deployment
metadata:
  name: minikube-demo-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minikube-demo-server
  template:
    metadata:
      labels:
        app: minikube-demo-server
    spec:
      containers:
        - name: minikube-demo-server
          image: minikube-demo-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
