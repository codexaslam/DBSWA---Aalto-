services:
  server:
    build: server
    restart: unless-stopped
    volumes:
      - ./server:/app
    ports:
      - 8000:8000
    deploy:
      resources:
        limits:
          cpus: "0.5"

  client:
    build: client
    restart: unless-stopped
    volumes:
      - ./client:/app
    ports:
      - 4321:4321
    depends_on:
      - server

  k6-tests:
    build: k6-tests
    entrypoint: /bin/true
    volumes:
      - ./k6-tests/tests:/tests
    depends_on:
      - client
