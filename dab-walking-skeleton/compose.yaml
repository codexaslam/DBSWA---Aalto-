services:
  traefik:
    image: traefik:v3.3
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:8000"
    ports:
      - "8080:8080"
      - "8000:8000"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  redis:
    image: redis:alpine
    restart: unless-stopped

  consumer-server:
    build: consumer-server
    restart: unless-stopped
    volumes:
      - ./consumer-server:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    # Using project.env if available, typically for DB credentials
    env_file:
      - project.env
    depends_on:
      - redis
      # Assuming 'database' service exists in project.env/network context or implied.
      # The original walking skeleton might rely on an external DB or one defined elsewhere?
      # Wait, checking if 'database' service is defined in this compose file...
      # It is NOT defined in the previous `cat` output of compose.yaml.
      # However, the user provided snippet:
      #   depends_on:
      #     - redis
      #     - database
      # Let's check if 'database' is defined or if I missed it.
      # The prompt walking skeleton usually has a database service.
      # Let me check if I should add it or if it's there but truncated.
      # The prompt says: "The concrete work relates to creating users... CREATE TABLE users..."
      # And "depends_on: - database".
      # I will assume 'database' service typically exists in the 'dab-overarching-project' or similar,
      # but if this is a standalone walking skeleton, it should be here.
      # Let's check if 'database' is in `dab-overarching-project/compose.yaml`.
      # But here we are editing `dab-walking-skeleton/compose.yaml`.
      # If `database` is missing from `dab-walking-skeleton/compose.yaml`, I should probably add one or check where it connects.
      # Ah, the user snippet for `server` also has `depends_on: - database`.
      # In my `read_file` of `compose.yaml` (lines 1-50+), I didn't see `database` service definition.
      # Let me read specific sections or use grep to find `database`.

  server:
    build: server
    restart: unless-stopped
    volumes:
      - ./server:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.1"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server-router.entrypoints=web"
      - "traefik.http.routers.server-router.rule=PathPrefix(`/`)"
      - "traefik.http.services.server-service.loadbalancer.server.port=8000"

  client:
    build: client
    restart: unless-stopped
    volumes:
      - ./client:/app
    ports:
      - 4321:4321
    depends_on:
      - server

  k6-tests:
    build: k6-tests
    entrypoint: /bin/true
    volumes:
      - ./k6-tests/tests:/tests
    depends_on:
      - client
